<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AED Studios - The Orangerie</title>
    <!-- Google Font: Rubik inladen -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Basis instellingen en Variabelen */
        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom: 40px;
        }

        /* Header Styling */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #444;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-placeholder {
            background-color: var(--accent-color);
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            font-size: 12px;
        }

        .language-toggles {
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            background: #444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: var(--font-main);
            font-weight: bold;
            cursor: pointer;
        }

        .lang-btn.active {
            background: var(--accent-color);
        }

        /* Navigatie (Terug knop) */
        .sub-nav {
            display: flex;
            align-items: center;
            padding: 20px;
            gap: 15px;
        }

        .back-btn {
            background: transparent;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            padding: 0;
        }

        .back-btn img {
            width: 100%;
            height: 100%;
        }

        /* Hero Afbeelding */
        .hero {
            position: relative;
            margin: 0 20px 30px 20px;
            border-radius: 20px;
            overflow: hidden;
            height: 250px;
            background-color: #000;
        }

        .hero img.hero-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }

        .hero-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Secties (About, Contact, Gallery) */
        .info-section {
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .section-title {
            color: var(--accent-color);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }

        /* Contact Kaartje Specifiek */
        .contact-card {
            display: flex;
            align-items: center;
            padding: 15px 20px;
        }

        .contact-icon {
            background-color: #4A1A1A;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            padding: 8px;
        }

        .contact-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .contact-label {
            font-size: 12px;
            color: #888;
        }

        #studio-email {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
        }

        .arrow-right {
            width: 10px;
            height: auto;
            display: flex;
        }

        .arrow-right img {
            width: 100%;
            height: auto;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .gallery-grid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <!-- Header (Logo & Taal) -->
    <header class="main-header">
        <div class="logo-area">
            <div class="logo-placeholder">A</div>
            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
        </div>
        <div class="language-toggles">
            <button class="lang-btn">NL</button>
            <button class="lang-btn active">EN</button>
            <button class="lang-btn">FR</button>
        </div>
    </header>

    <!-- Terug knop & Titel -->
    <nav class="sub-nav">
        <!-- Verwijzing naar images map toegevoegd -->
        <button class="back-btn"><img src="images/Button.svg" alt="Terug"></button>
        <h2 id="page-title">Loading...</h2>
    </nav>

    <main>
        <!-- Hero Sectie -->
        <section class="hero">
            <img id="hero-image" class="hero-bg" src="" alt="Hero Afbeelding">
            <div class="hero-content">
                <!-- Verwijzing naar images map toegevoegd -->
                <div class="hero-icon"><img src="images/Container.svg" alt="Orangerie Icon"></div>
                <h1 id="studio-title">Loading...</h1>
            </div>
        </section>

        <!-- About Sectie -->
        <section class="info-section">
            <h3 class="section-title">ABOUT STUDIO</h3>
            <div class="card">
                <p id="studio-description">Informatie wordt geladen...</p>
            </div>
        </section>

        <!-- Contact Sectie -->
        <section class="info-section">
            <h3 class="section-title">CONTACT</h3>
            <div class="card contact-card">
                <!-- Verwijzing naar images map toegevoegd -->
                <div class="contact-icon"><img src="images/Icon.svg" alt="Email Icon"></div>
                <div class="contact-info">
                    <span class="contact-label">Email</span>
                    <a href="#" id="studio-email">Loading...</a>
                </div>
                <!-- Verwijzing naar images map toegevoegd -->
                <div class="arrow-right"><img src="images/Vector.svg" alt="Arrow Right"></div>
            </div>
        </section>

        <!-- Gallery Sectie -->
        <section class="info-section">
            <h3 class="section-title">GALLERY</h3>
            <div class="gallery-grid" id="gallery-container">
                <!-- Afbeeldingen worden hier door JavaScript ingeladen -->
            </div>
        </section>
    </main>

    <script>
        // 1. Mock Database met paden naar de images map
        const databaseData = {
            title: "The Orangerie",
            description: "The Orangerie is a unique 850 m² transparent event space, surrounded by nature and greenery. Flooded with natural light by day and transformed into an atmospheric venue by night, it offers a stylish setting enhanced with elegant chandeliers, subtle sound and lighting.",
            email: "Sales@aedstudios.com",
            heroImage: "images/image 3.svg", 
            galleryImages: [
                "images/image 2.svg",
                "images/image 3.svg",
                "images/image 4.svg",
                "images/image 5.svg"
            ]
        };

        // 2. Functie om de HTML te vullen met de data
        function buildPage(data) {
            // Tekst invullen
            document.getElementById('page-title').textContent = data.title;
            document.getElementById('studio-title').textContent = data.title;
            document.getElementById('studio-description').textContent = data.description;
            
            // Email invullen
            const emailLink = document.getElementById('studio-email');
            emailLink.textContent = data.email;
            emailLink.href = "mailto:" + data.email;

            // Hero image invullen
            document.getElementById('hero-image').src = data.heroImage;

            // Gallery opbouwen
            const galleryContainer = document.getElementById('gallery-container');
            galleryContainer.innerHTML = ''; 

            data.galleryImages.forEach(imageUrl => {
                const imgElement = document.createElement('img');
                imgElement.src = imageUrl;
                imgElement.alt = "Gallery Afbeelding";
                galleryContainer.appendChild(imgElement);
            });
        }

        // 3. Bouw de pagina op
        buildPage(databaseData);
    </script>
</body>
</html>
