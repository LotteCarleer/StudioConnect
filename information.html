<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AED Studios - The Orangerie</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Basis instellingen en Variabelen */
        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            /* AANGEPAST: Meer ruimte onderaan toegevoegd zodat je voorbij de galerij kan scrollen */
            padding-bottom: 140px; 
        }

        /* Header Styling */
        .main-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid #fe0d005a;
        }

        .logo-area{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-placeholder{
            
            color:white;
            width:60px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:24px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .logo-text{
            display:flex;
            flex-direction:column;
        }

        .logo-text strong{
            font-size:16px;
        }

        .logo-text span{
            color:#888;
            font-size:12px;
        }

        .language-toggles{
            display:flex;
            gap:8px;
        }

        .lang-btn{
            background:#444;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            font-family:var(--font-main);
            font-weight:bold;
            cursor:pointer;
        }

        .lang-btn.active{
            background:var(--accent-color);
        }

        /* Navigatie (Terug knop) */
        .sub-nav {
            display: flex;
            align-items: center;
            padding: 20px;
            gap: 15px;
        }

        .back-btn {
            background: transparent;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            padding: 0;
        }

        .back-btn img {
            width: 100%;
            height: 100%;
        }

        /* Hero Afbeelding met Rode Overlay en Border */
        .hero {
            position: relative;
            margin: 0 20px 30px 20px;
            border-radius: 20px;
            overflow: hidden;
            height: 250px;
            background-color: #000;
            border: 2px solid var(--accent-color); /* Dunner rode border */
        }

        /* Dit is de rode overlay */
        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(254, 13, 0, 0.3); /* Semi-transparant rood over de foto */
            z-index: 1; /* Ligt over de foto, maar onder de tekst */
        }

        .hero img.hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2; /* Zorgt dat het icoon en tekst BOVEN de rode overlay liggen */
        }

        .hero-icon {
            width: 70px;
            height: 70px;
            margin-bottom: 10px;
        }

        .hero-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #studio-title {
            color: var(--text-color);
            font-size: 24px;
            font-weight: 700;
        }

        /* Secties (About, Contact, Gallery) */
        .info-section {
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .section-title {
            color: var(--accent-color);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }

        /* Contact Kaartje Specifiek */
        .contact-card {
            display: flex;
            align-items: center;
            padding: 15px 20px;
        }

        .contact-icon {
            background-color: #4A1A1A;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            padding: 8px;
        }

        .contact-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .contact-label {
            font-size: 12px;
            color: #888;
        }

        #studio-email {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
        }

        .arrow-right {
            width: 10px;
            height: auto;
            display: flex;
        }

        .arrow-right img {
            width: 100%;
            height: auto;
        }

        /* Gallery Grid met extra ronde borders */
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .gallery-grid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            /* AANGEPAST: Border-radius nog groter gemaakt voor extra ronde hoeken */
            border-radius: 40px; 
        }


        .bottom-nav{
            position:fixed;
            bottom:0px;
            left:0px;
            right:0px;
            background:#2f2d2d;
            padding:18px 10px;
            display:flex;
            justify-content:space-around;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
            border-top:1px solid #4a4a4a;
        }

      .nav-item{
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    color:#8e8e8e;
    font-size:13px;
    cursor:pointer;
}

        .nav-icon{
            width:56px;
            height:56px;
            border-radius:18px;
            background:#3a3939;
            border:1px solid #5c5c5c;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
        }

      

        .nav-item.active .nav-icon{
            background:var(--accent-color);
            color:white;
            border:none;
            
        }
    </style>
</head>
<body>

    <header class="main-header">

        <div class="logo-area">
            <div class="logo-placeholder"><img src="./images/Logo.svg" alt="logo"></div>

            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
        </div>

        <div class="language-toggles">
            <button class="lang-btn">NL</button>
            <button class="lang-btn active">EN</button>
            <button class="lang-btn">FR</button>
        </div>

    </header>


    <nav class="sub-nav">
        <button class="back-btn" onclick="window.location.href='overview.html'"><img src="images/Button.svg" alt="Terug"></button>
        <h2 id="page-title">Loading...</h2>
    </nav>

    <main>
        <section class="hero">
            <img id="hero-image" class="hero-bg" src="" alt="Hero Afbeelding">
            <div class="hero-content">
                <div class="hero-icon"><img src="images/Container (3).svg" alt="Orangerie Icon"></div>
                <h1 id="studio-title">Loading...</h1>
            </div>
        </section>

        <section class="info-section">
            <h3 class="section-title">ABOUT STUDIO</h3>
            <div class="card">
                <p id="studio-description">Informatie wordt geladen...</p>
            </div>
        </section>

        <section class="info-section">
            <h3 class="section-title">CONTACT</h3>
            <div class="card contact-card">
                <div class="contact-icon"><img src="images/Icon.svg" alt="Email Icon"></div>
                <div class="contact-info">
                    <span class="contact-label">Email</span>
                    <a href="#" id="studio-email">Loading...</a>
                </div>
                <div class="arrow-right"><img src="images/Vector.svg" alt="Arrow Right"></div>
            </div>
        </section>

        <section class="info-section">
            <h3 class="section-title">GALLERY</h3>
            <div class="gallery-grid" id="gallery-container">
                </div>
        </section>

        <nav class="bottom-nav">

            <a href="index.html" class="nav-item">
                <div class="nav-icon">
                    <img src="./images/HomeIcon.svg" alt="Home">
                </div>
                <span>Home</span>
            </a>
        
            <a href="map.html" class="nav-item">
                <div class="nav-icon">
                    <img src="./images/MapIcontrans.svg" alt="Map">
                </div>
                <span>Map</span>
            </a>
        
            <a href="overview.html" class="nav-item">
                <div class="nav-icon">
                    <img src="./images/StudioIcontrans.svg" alt="Studio's">
                </div>
                <span>Studio's</span>
            </a>
        
           <a href="#" id="eventNavBtn" class="nav-item">
                <div class="nav-icon">
                    <img src="./images/EventIcontrans.svg" alt="Event">
                </div>
                <span>Event</span>
            </a>
        
        </nav>
        
    </main>

    <script>
        // 1. Mock Database
        const databaseData = {
            title: "The Orangerie",
            description: "The Orangerie is a unique 850 m² transparent event space, surrounded by nature and greenery. Flooded with natural light by day and transformed into an atmospheric venue by night, it offers a stylish setting enhanced with elegant chandeliers, subtle sound and lighting.",
            email: "Sales@aedstudios.com",
            // Hero image
            heroImage: "images/image 2 (1).svg", 
            galleryImages: [
                "images/image 2.svg",
                "images/image 3.svg",
                "images/image 4.svg",
                "images/image 5.svg"
            ]
        };

        // 2. Functie om de HTML te vullen met de data
        function buildPage(data) {
            // Tekst invullen
            document.getElementById('page-title').textContent = data.title;
            document.getElementById('studio-title').textContent = data.title;
            document.getElementById('studio-description').textContent = data.description;
            
            // Email invullen
            const emailLink = document.getElementById('studio-email');
            emailLink.textContent = data.email;
            emailLink.href = "mailto:" + data.email;

            // Hero image invullen
            document.getElementById('hero-image').src = data.heroImage;

            // Gallery opbouwen
            const galleryContainer = document.getElementById('gallery-container');
            galleryContainer.innerHTML = ''; 

            data.galleryImages.forEach(imageUrl => {
                const imgElement = document.createElement('img');
                imgElement.src = imageUrl;
                imgElement.alt = "Gallery Afbeelding";
                galleryContainer.appendChild(imgElement);
            });
        }

        // 3. Bouw de pagina op
        buildPage(databaseData);
    </script>
</body>
</html>
