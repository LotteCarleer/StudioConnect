<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AED Studios - Home</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <style>

        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom:120px;
        }

        /* HEADER */

        .main-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid #fe0d005a;
        }

        .logo-area{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-placeholder{
            
            color:white;
            width:60px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:24px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .logo-text{
            display:flex;
            flex-direction:column;
        }

        .logo-text strong{
            font-size:16px;
        }

        .logo-text span{
            color:#888;
            font-size:12px;
        }

        .language-toggles{
            display:flex;
            gap:8px;
        }

        .lang-btn{
            background:#444;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            font-family:var(--font-main);
            font-weight:bold;
            cursor:pointer;
        }

        .lang-btn.active{
            background:var(--accent-color);
        }

        /* ACCESS PAGE */

.access-page{
    padding:50px 32px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.access-icon{
    width:82px;
    height:82px;
    border-radius:24px;
    background:var(--accent-color);
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:32px;
}

.access-icon img{
    width:30px;
    height:30px;
}

.access-page h1{
    font-size:24px;
    margin-bottom:16px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#A0A0A0;
    font-size:14px;
    line-height:1.7;
    max-width:280px;
    margin-bottom:28px;
}

/* ERROR */

.error-box{
    width:100%;
    border:2px solid var(--accent-color);
    border-radius:18px;
    padding:18px;
    color:#B8AFAF;
    font-size:14px;
    line-height:1.7;
    margin-bottom:20px;

    display:none;
}

.error-box.show{
    display:block;
}

/* INPUT */

#accessCode{
    width:100%;
    height:64px;

    background:#343232;

    border:2px solid #4A4747;
    border-radius:18px;

    outline:none;

    padding:0 22px;

    color:white;
    font-size:18px;
    letter-spacing:3px;

    margin-bottom:20px;

    font-family:var(--font-main);
}

#accessCode::placeholder{
    color:#8A8686;
    letter-spacing:3px;
}

/* BUTTON */

#submitBtn{
    width:100%;
    height:64px;

    border:none;
    border-radius:18px;

    background:#4A4747;
    color:#7E7A7A;

    font-size:18px;
    font-weight:700;

    cursor:pointer;
    transition:0.2s;

    font-family:var(--font-main);
}

/* ACTIVE BUTTON */

#submitBtn.active{
    background:var(--accent-color);
    color:white;
}

/* ERROR BUTTON */

#submitBtn.error{
    background:var(--accent-color);
    color:white;
}
       

        .bottom-nav{
            position:fixed;
            bottom:0px;
            left:0px;
            right:0px;
            background:#2f2d2d;
            padding:18px 10px;
            display:flex;
            justify-content:space-around;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
            border-top:1px solid #4a4a4a;
        }

       .nav-item{
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    color:#8e8e8e;
    font-size:13px;
    cursor:pointer;
}

        .nav-icon{
            width:56px;
            height:56px;
            border-radius:18px;
            background:#3a3939;
            border:1px solid #5c5c5c;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
        }

      

        .nav-item.active .nav-icon{
            background:var(--accent-color);
            color:white;
            border:none;
            
        }

    </style>
</head>

<body>

  

    <header class="main-header">

        <div class="logo-area">
            <div class="logo-placeholder"><img src="./images/Logo.svg" alt="logo"></div>

            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
        </div>

        <div class="language-toggles">
            <button class="lang-btn">NL</button>
            <button class="lang-btn active">EN</button>
            <button class="lang-btn">FR</button>
        </div>

    </header>

   

<main class="access-page">

    <div class="access-icon">
        <img src="./images/Lock.svg" alt="Lock">
    </div>

    <h1>Access Code</h1>

    <p class="subtitle">
        Enter your unique company code to view events
    </p>

    
    <div class="error-box" id="errorBox">
        An invite code is required to proceed. If you haven't received one, this page may not be relevant to you.
    </div>

   
    <input 
        type="text" 
        id="accessCode"
        placeholder="ENTER CODE"
    >

    
    <button id="submitBtn">
        SUBMIT
    </button>

</main>


   

   <nav class="bottom-nav">

    <a href="index.html" class="nav-item ">
        <div class="nav-icon">
            <img src="./images/HomeIcon.svg" alt="Home">
        </div>
        <span>Home</span>
    </a>

    <a href="map.html" class="nav-item">
        <div class="nav-icon">
            <img src="./images/MapIcontrans.svg" alt="Map">
        </div>
        <span>Map</span>
    </a>

    <a href="studios.html" class="nav-item">
        <div class="nav-icon">
            <img src="./images/StudioIcontrans.svg" alt="Studio's">
        </div>
        <span>Studio's</span>
    </a>

    <a href="events.html" class="nav-item active">
        <div class="nav-icon">
            <img src="./images/EventIconfull.svg" alt="Event">
        </div>
        <span>Event</span>
    </a>

</nav>
  
<script> 


    const input = document.getElementById('accessCode');
    const button = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');

    /* JUISTE CODE */

    const validCode = "Studio123";

    /* BUTTON ACTIVE */

    input.addEventListener('input', () => {

        if(input.value.trim() !== ""){

            button.classList.add('active');

        }else{

            button.classList.remove('active');

        }

    });

    /* SUBMIT */

    button.addEventListener('click', () => {

        const enteredCode = input.value.trim();

        /* RESET */

        errorBox.classList.remove('show');

        button.classList.remove('error');

        button.textContent = "SUBMIT";

        /* CORRECTE CODE */

        if(enteredCode === validCode){

            /* TOEGANG OPSLAAN */

            sessionStorage.setItem("eventAccess", "granted");

            /* REDIRECT */

            window.location.href = "event-overview.html";

        }

        /* FOUTE CODE */

        else{

            errorBox.classList.add('show');

            button.classList.add('error');

            button.textContent = "PLEASE TRY AGAIN";

        }

    });



</script>

</body>
</html>
