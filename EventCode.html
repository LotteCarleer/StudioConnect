<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AED Studios - Home</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <style>

        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom:120px;
        }

        /* HEADER */

        .main-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid #fe0d005a;
        }

        .logo-area{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-placeholder{
            
            color:white;
            width:60px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:24px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .logo-text{
            display:flex;
            flex-direction:column;
        }

        .logo-text strong{
            font-size:16px;
        }

        .logo-text span{
            color:#888;
            font-size:12px;
        }

        .language-toggles{
            display:flex;
            gap:8px;
        }

        .lang-btn{
            background:#444;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            font-family:var(--font-main);
            font-weight:bold;
            cursor:pointer;
        }

        .lang-btn.active{
            background:var(--accent-color);
        }

       
        /* BOTTOM NAV */

        .bottom-nav{
            position:fixed;
            bottom:0px;
            left:0px;
            right:0px;
            background:#2f2d2d;
            padding:18px 10px;
            display:flex;
            justify-content:space-around;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
            border-top:1px solid #4a4a4a;
        }

       .nav-item{
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    color:#8e8e8e;
    font-size:13px;
    cursor:pointer;
}

        .nav-icon{
            width:56px;
            height:56px;
            border-radius:18px;
            background:#3a3939;
            border:1px solid #5c5c5c;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
        }

      

        .nav-item.active .nav-icon{
            background:var(--accent-color);
            color:white;
            border:none;
            
        }

    </style>
</head>
<body>

  

    <header class="main-header">

        <div class="logo-area">
            <div class="logo-placeholder"><img src="./images/Logo.svg" alt="logo"></div>

            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
        </div>

        <div class="language-toggles">
            <button class="lang-btn">NL</button>
            <button class="lang-btn active">EN</button>
            <button class="lang-btn">FR</button>
        </div>

    </header>

    


   

   <nav class="bottom-nav">

    <a href="index.html" class="nav-item ">
        <div class="nav-icon">
            <img src="./images/HomeIcon.svg" alt="Home">
        </div>
        <span>Home</span>
    </a>

    <a href="map.html" class="nav-item">
        <div class="nav-icon">
            <img src="./images/MapIcontrans.svg" alt="Map">
        </div>
        <span>Map</span>
    </a>

    <a href="studios.html" class="nav-item">
        <div class="nav-icon">
            <img src="./images/StudioIcontrans.svg" alt="Studio's">
        </div>
        <span>Studio's</span>
    </a>

    <a href="events.html" class="nav-item active">
        <div class="nav-icon">
            <img src="./images/EventIconfull.svg" alt="Event">
        </div>
        <span>Event</span>
    </a>

</nav>
</body>
