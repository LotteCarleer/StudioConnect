<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AED Studios - Overview</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Basis instellingen en Variabelen */
        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
            --text-muted: #999999;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom: 40px;
        }

        /* Header Styling */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #444;
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .main-logo {
            height: 35px;
            width: auto;
            object-fit: contain;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            font-size: 12px;
        }

        .language-toggles {
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            background: #444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: var(--font-main);
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        .lang-btn.active {
            background: var(--accent-color);
        }

        /* Pagina Content Wrapper */
        .page-content {
            padding: 25px 20px;
        }

        /* Titel Sectie */
        .page-title-area {
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Zoekbalk */
        .search-container {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .search-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            opacity: 0.6;
        }

        .search-input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Lijst met Studios */
        .studios-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Individueel Studio Kaartje */
        .studio-card {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none; 
            color: inherit;
        }

        .studio-card:active {
            background-color: #444;
        }

        /* Het blokje met het rode icoon erin */
        .studio-icon-box {
            width: 50px;
            height: 50px;
            background-color: rgba(254, 13, 0, 0.05); 
            border: 1px solid rgba(254, 13, 0, 0.2); 
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .studio-icon-box img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        /* Tekst in het kaartje */
        .studio-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .studio-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .studio-type {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Rode pijltje naar rechts (GROTER GEMAAKT) */
        .arrow-right {
            width: 32px; /* Aangepast van 8px naar 16px */
            height: auto;
            margin-left: 15px;
            opacity: 1; /* Verhoogd naar 1 voor een vollere kleur */
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <img src="images/aed_studios_logo_white 2.svg" alt="AED Studios Logo" class="main-logo">
            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
        </div>
        <div class="language-toggles">
            <button class="lang-btn">NL</button>
            <button class="lang-btn active">EN</button>
            <button class="lang-btn">FR</button>
        </div>
    </header>

    <main class="page-content">
        
        <div class="page-title-area">
            <h1 class="page-title">Studios Network</h1>
            <p class="page-subtitle">Discover 18 creative studios</p>
        </div>

        <div class="search-container">
            <img src="images/Icon (1).svg" alt="Search" class="search-icon">
            <input type="text" class="search-input" placeholder="Search studios...">
        </div>

        <div class="studios-list" id="studios-container">
            <p>Loading studios...</p>
        </div>

    </main>

    <script>
        // Database Array
        const studiosDatabase = [
            { id: "orangerie", name: "The orangerie", type: "Backstage" },
            { id: "studio1", name: "Studio 1", type: "Occupied by Banijay" },
            { id: "studio2", name: "Studio 2", type: "Occupied by Banijay" },
            { id: "studio3", name: "Studio 3", type: "Black box" },
            { id: "studio4", name: "Studio 4", type: "Black box" },
            { id: "studio5", name: "Studio 5", type: "Black box" },
            { id: "studio6", name: "Studio 6", type: "Restaurant" },
            { id: "studio7", name: "Studio 7", type: "Black box" },
            { id: "studio8", name: "Studio 8", type: "Auditorium" },
            { id: "studio9", name: "Studio 9", type: "Black box" },
            { id: "studio10A", name: "Studio 10A", type: "Black box" },
            { id: "studio10B", name: "Studio 10B", type: "Black box" },
            { id: "studio11", name: "Studio 11", type: "Black box" },
            { id: "studio12", name: "Studio 12", type: "Water tank" },
            { id: "studio14", name: "Studio 14", type: "Black box" },
            { id: "studio15", name: "Studio 15", type: "Occupied by Banijay" },
            { id: "studio16", name: "Studio 16", type: "Event hall" },
            { id: "cinema", name: "AED Cinema", type: "Cinema" }
        ];

        // Functie om de HTML lijst op te bouwen
        function renderStudiosList(studiosData) {
            const container = document.getElementById('studios-container');
            container.innerHTML = ''; 

            studiosData.forEach(studio => {
                const cardElement = document.createElement('a');
                cardElement.href = "information.html"; 
                cardElement.className = 'studio-card';

                cardElement.innerHTML = `
                    <div class="studio-icon-box">
                        <img src="images/Icon (2).svg" alt="Building Icon">
                    </div>
                    <div class="studio-info">
                        <div class="studio-name">${studio.name}</div>
                        <div class="studio-type">${studio.type}</div>
                    </div>
                    <img src="images/Container (4).svg" alt="Arrow Right" class="arrow-right">
                `;

                container.appendChild(cardElement);
            });
        }

        renderStudiosList(studiosDatabase);
    </script>
</body>
</html>
