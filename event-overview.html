<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 
    <style>

        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom:120px;
        }

        .main-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid #fe0d005a;
        }

        .logo-area{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-placeholder{
            width:60px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .logo-text{
            display:flex;
            flex-direction:column;
        }

        .logo-text strong{
            font-size:16px;
        }

        .logo-text span{
            color:#888;
            font-size:12px;
        }

        .language-toggles{
            display:flex;
            gap:8px;
        }

        .lang-btn{
            background:#444;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            font-family:var(--font-main);
            font-weight:bold;
            cursor:pointer;
        }

        .lang-btn.active{
            background:var(--accent-color);
        }

        .event-page{
            padding-bottom:140px;
        }

        .event-hero{
            height:425px;

            background:
            radial-gradient(circle at top left, rgba(254,13,0,0.35), transparent 70%),
            linear-gradient(180deg, #651313 0%, #2A2020 100%);

            display:flex;
            justify-content:center;
            align-items:center;

            padding:40px 32px;
        }

        .hero-content{
            display:flex;
            flex-direction:column;
            align-items:center;
            text-align:center;
        }

        .hero-icon{
            width:82px;
            height:82px;

            border-radius:24px;

            background:var(--accent-color);

            display:flex;
            justify-content:center;
            align-items:center;

            margin-bottom:32px;
        }

        .hero-icon img{
            width:34px;
            height:34px;
        }

        .hero-content h1{
            font-size:28px;
            line-height:1.3;
            margin-bottom:18px;
            font-weight:700;
        }

        .hero-content p{
            font-size:14px;
            line-height:1.8;
            color:#D1CFCF;
            max-width:250px;
        }

        .info-section,
        .expect-section,
        .button-section{
            padding:24px;
        }

        .info-card{
            background:#333131;
            border-radius:28px;
            padding:24px;
            display:flex;
            gap:18px;
            border:1px solid rgba(255,255,255,0.04);
        }

        .info-icon{
            min-width:48px;
            height:48px;
            border-radius:16px;
            background:#FE0D00;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .info-icon img{
            width:22px;
            height:22px;
        }

        .info-card p{
            color:#D4D0D0;
            font-size:14px;
            line-height:1.9;
        }

        .expect-section h2{
            font-size:18px;
            margin-bottom:22px;
        }

        .expect-card{
            background:#333131;
            border-radius:22px;
            padding:22px;
            display:flex;
            align-items:flex-start;
            gap:18px;
            margin-bottom:16px;
            border:1px solid rgba(255,255,255,0.04);
        }

        .expect-icon{
            min-width:40px;
            height:40px;
            border-radius:14px;
            background:rgba(254,13,0,0.08);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .expect-icon img{
            width:18px;
            height:18px;
        }

        .expect-card p{
            color:#D5D2D2;
            font-size:14px;
            line-height:1.8;
        }

        .event-button{
            width:100%;
            height:64px;
            border:none;
            border-radius:20px;
            background:var(--accent-color);
            color:white;
            font-size:18px;
            font-weight:700;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:14px;
            font-family:var(--font-main);
            cursor:pointer;
            transition:0.2s;
            text-decoration:none;
        }

        .event-button span{
            font: size 20px;
            margin-top:-2px;
        }

        .event-button:hover{
            transform:translateY(-2px);
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            background:#2f2d2d;
            padding:18px 10px;
            display:flex;
            justify-content:space-around;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
            border-top:1px solid #4a4a4a;
        }

        .nav-item{
            text-decoration:none;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            color:#8e8e8e;
            font-size:13px;
            cursor:pointer;
        }

        .nav-icon{
            width:56px;
            height:56px;
            border-radius:18px;
            background:#3a3939;
            border:1px solid #5c5c5c;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
        }

        .nav-item.active .nav-icon{
            background:var(--accent-color);
            color:white;
            border:none;
        }

    </style>

</head>

<script>

    const access = sessionStorage.getItem("eventAccess");

    if(access !== "granted"){

        window.location.href = "EventCode.html";

    }

</script>

<body>

<header class="main-header">

    <div class="logo-area">

        <div class="logo-placeholder">
            <img src="./images/Logo.svg" alt="logo">
        </div>

        <div class="logo-text">

            <strong>AED STUDIOS</strong>

            <span>Creative Network</span>

        </div>

    </div>

    <div class="language-toggles">

        <button class="lang-btn" id="btn-nl">
            NL
        </button>

        <button class="lang-btn active" id="btn-en">
            EN
        </button>

        <button class="lang-btn" id="btn-fr">
            FR
        </button>

    </div>

</header>

<main class="event-page">

    <section class="event-hero">

        <div class="hero-content">

            <div class="hero-icon">

                <img
                    src="./images/EventIconfull.svg"
                    alt="Event"
                >

            </div>

            <h1 data-translate="heroTitle"></h1>

            <p data-translate="heroSubtitle"></p>

        </div>

    </section>

    <section class="info-section">

        <div class="info-card">

            <div class="info-icon">

                <img
                    src="./images/Stars.svg"
                    alt="Info"
                >

            </div>

            <p data-translate="infoText"></p>

        </div>

    </section>

    <section class="expect-section">

        <h2 data-translate="expectTitle"></h2>

        <div class="expect-card">

            <div class="expect-icon">

                <img
                    src="./images/PeopleIcon.svg"
                    alt="People"
                >

            </div>

            <p data-translate="expect1"></p>

        </div>

        <div class="expect-card">

            <div class="expect-icon">

                <img
                    src="./images/StarIconred.svg"
                    alt="Knowledge"
                >

            </div>

            <p data-translate="expect2"></p>

        </div>

        <div class="expect-card">

            <div class="expect-icon">

                <img
                    src="./images/Calenderred.svg"
                    alt="Projects"
                >

            </div>

            <p data-translate="expect3"></p>

        </div>

    </section>

    <section class="button-section">

        <a
            href="EventDatum.html"
            class="event-button"
        >

            <span data-translate="buttonText"></span>

            <span>→</span>

        </a>

    </section>

</main>

<nav class="bottom-nav">

    <a href="index.html" class="nav-item">

        <div class="nav-icon">

            <img
                src="./images/HomeIcon.svg"
                alt="Home"
            >

        </div>

        <span data-translate="navHome"></span>

    </a>

    <a href="map.html" class="nav-item">

        <div class="nav-icon">

            <img
                src="./images/MapIcontrans.svg"
                alt="Map"
            >

        </div>

        <span data-translate="navMap"></span>

    </a>

    <a href="overview.html" class="nav-item">

        <div class="nav-icon">

            <img
                src="./images/StudioIcontrans.svg"
                alt="Studio's"
            >

        </div>

        <span data-translate="navStudios"></span>

    </a>

    <a href="events.html" class="nav-item active">

        <div class="nav-icon">

            <img
                src="./images/EventIconfull.svg"
                alt="Event"
            >

        </div>

        <span data-translate="navEvent"></span>

    </a>

</nav>

<script>

    const translations = {

        en: {

            heroTitle:
                "2026 Networking Events",

            heroSubtitle:
                "Connect with creatives across all AED Studios",

            infoText:
                "Every quarter we're hosting an exclusive networking event bringing together professionals from all studios. A unique opportunity to make new connections, share knowledge, and collaborate on future projects.",

            expectTitle:
                "What to Expect",

            expect1:
                "Networking opportunities with producers, developers, designers and more",

            expect2:
                "Knowledge sharing about new technologies and creative processes",

            expect3:
                "Opportunities for future collaboration and projects",

            buttonText:
                "VIEW AVAILABLE DATES",

            navHome:
                "Home",

            navMap:
                "Map",

            navStudios:
                "Studios",

            navEvent:
                "Event"

        },

        nl: {

            heroTitle:
                "2026 Networking Events",

            heroSubtitle:
                "Connecteer met creatives verspreid over alle AED Studios",

            infoText:
                "Elk kwartaal organiseren we een exclusief networking event dat professionals uit alle studio’s samenbrengt. Een unieke kans om nieuwe connecties te maken, kennis te delen en samen te werken aan toekomstige projecten.",

            expectTitle:
                "Wat Kan Je Verwachten",

            expect1:
                "Netwerkmogelijkheden met producers, developers, designers en meer",

            expect2:
                "Kennisdeling over nieuwe technologieën en creatieve processen",

            expect3:
                "Kansen voor toekomstige samenwerkingen en projecten",

            buttonText:
                "BEKIJK BESCHIKBARE DATA",

            navHome:
                "Home",

            navMap:
                "Kaart",

            navStudios:
                "Studio's",

            navEvent:
                "Event"

        },

        fr: {

            heroTitle:
                "Événements Networking 2026",

            heroSubtitle:
                "Connectez-vous avec les créatifs de tous les AED Studios",

            infoText:
                "Chaque trimestre, nous organisons un événement de networking exclusif réunissant des professionnels de tous les studios. Une opportunité unique de créer de nouvelles connexions, partager des connaissances et collaborer sur de futurs projets.",

            expectTitle:
                "À Quoi S'attendre",

            expect1:
                "Opportunités de networking avec des producteurs, développeurs, designers et plus encore",

            expect2:
                "Partage de connaissances sur les nouvelles technologies et les processus créatifs",

            expect3:
                "Opportunités de collaborations et projets futurs",

            buttonText:
                "VOIR LES DATES DISPONIBLES",

            navHome:
                "Accueil",

            navMap:
                "Carte",

            navStudios:
                "Studios",

            navEvent:
                "Événement"

        }

    };

    function setLanguage(language){

        localStorage.setItem(
            "language",
            language
        );

        document
        .querySelectorAll(".lang-btn")
        .forEach(btn => {

            btn.classList.remove("active");

        });

        document
        .getElementById(`btn-${language}`)
        .classList.add("active");

        document
        .querySelectorAll("[data-translate]")
        .forEach(element => {

            const key =
                element.dataset.translate;

            element.textContent =
                translations[language][key];

        });

    }

    document
    .getElementById("btn-nl")
    .addEventListener("click", () => {

        setLanguage("nl");

    });

    document
    .getElementById("btn-en")
    .addEventListener("click", () => {

        setLanguage("en");

    });

    document
    .getElementById("btn-fr")
    .addEventListener("click", () => {

        setLanguage("fr");

    });

    const savedLanguage =

        localStorage.getItem("language")

        || "en";

    setLanguage(savedLanguage);

</script>

</body>
</html>
