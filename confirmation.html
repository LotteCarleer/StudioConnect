<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation</title>

    <style>

        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom:120px;
        }
        

.success-page{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;
}



.success-card{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}



.success-icon{
    width:100px;
    height:100px;

    border-radius:28px;

    background:var(--accent-color);

    display:flex;
    justify-content:center;
    align-items:center;

    margin-bottom:34px;
}

.success-icon img{
    width:44px;
    height:44px;
}



.success-card h1{
    font-size:28px;
    line-height:1.3;

    margin-bottom:18px;

    font-weight:700;
}



.success-card p{
    color:#A09B9B;

    font-size:16px;
    line-height:1.8;

    max-width:280px;
}
    </style>

</head>
<body>
    <!-- SUCCESS PAGE -->

<main class="success-page">

    <div class="success-card">

        <!-- ICON -->

        <div class="success-icon">

            <img src="./images/register.svg" alt="Success">

        </div>

        <!-- TITLE -->

        <h1>Successfully Registered!</h1>

        <!-- TEXT -->

        <p>
            You're registered for the event.
            See you there!
        </p>

    </div>

</main>

<script>

     

    setTimeout(() => {

        window.location.href =
            "event-overview.html";

    }, 5000);

</script>
</body>
</html>
