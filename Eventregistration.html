<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventregistration</title>

    <style>

        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom:120px;
        }

        .main-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid #fe0d005a;
        }

        .logo-area{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-placeholder{
            width:60px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .logo-text{
            display:flex;
            flex-direction:column;
        }

        .logo-text strong{
            font-size:16px;
        }

        .logo-text span{
            color:#888;
            font-size:12px;
        }

        .language-toggles{
            display:flex;
            gap:8px;
        }

        .lang-btn{
            background:#444;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            font-family:var(--font-main);
            font-weight:bold;
            cursor:pointer;
        }

        .lang-btn.active{
            background:var(--accent-color);
        }

        .registration-page{
            padding-bottom:140px;
        }

        .top-section{
            padding:20px 24px;
            border-top:1px solid rgba(255,0,0,0.15);
            border-bottom:1px solid rgba(255,255,255,0.05);
        }

        .back-btn{
            text-decoration:none;
            display:flex;
            align-items:center;
            gap:14px;
            color:white;
            font-size:16px;
            font-weight:600;
            font-family:var(--font-main);
            width:fit-content;
        }

        .back-icon{
            width:42px;
            height:42px;
            padding-bottom:2px;
            border-radius:50%;
            background:#3A3838;
            border:1px solid #4E4B4B;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
        }

        .title-section{
            padding:28px 24px;
            border-bottom:1px solid rgba(255,0,0,0.12);
        }

        .title-section h1{
            font-size:22px;
            margin-bottom:10px;
        }

        .title-section p{
            color:#9A9696;
            line-height:1.6;
            max-width:320px;
        }

        .form-section{
            padding:28px 24px;
        }

        .form-group{
            margin-bottom:28px;
        }

        .form-group label{
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:16px;
            font-size:15px;
            font-weight:600;
        }

        .form-group label img{
            width:18px;
            height:18px;
        }

        .form-group input{
            width:100%;
            height:62px;
            background:#3A3737;
            border:none;
            border-radius:18px;
            padding:0 20px;
            color:white;
            font-size:15px;
            font-family:var(--font-main);
            outline:none;
        }

        .form-group input::placeholder{
            color:#918D8D;
        }

        .roles-subtitle{
            color:#9C9898;
            font-size:14px;
            margin-bottom:18px;
        }

        .roles-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
        }

        .role-btn{
            height:54px;
            border:none;
            border-radius:16px;
            background:#3A3737;
            color:#E2DEDE;
            font-size:14px;
            font-weight:600;
            font-family:var(--font-main);
            cursor:pointer;
            transition:0.2s;
        }

        .role-btn.active{
            background:var(--accent-color);
            color:white;
        }

        .bottom-button{
            padding:0 24px;
        }

        #confirmBtn{
            width:100%;
            height:64px;
            border:none;
            border-radius:20px;
            background:#4A4747;
            color:#868181;
            font-size:18px;
            font-weight:700;
            font-family:var(--font-main);
            transition:0.2s;
            cursor:not-allowed;
        }

        #confirmBtn.active{
            background:var(--accent-color);
            color:white;
            cursor:pointer;
        }

    </style>

</head>

<body>
    
<header class="main-header">

    <div class="logo-area">

        <div class="logo-placeholder">
            <img src="./images/Logo.svg" alt="logo">
        </div>

        <div class="logo-text">

            <strong>AED STUDIOS</strong>

            <span>Creative Network</span>

        </div>

    </div>

    <div class="language-toggles">

        <button class="lang-btn" id="btn-nl">
            NL
        </button>

        <button class="lang-btn active" id="btn-en">
            EN
        </button>

        <button class="lang-btn" id="btn-fr">
            FR
        </button>

    </div>

</header>

<main class="registration-page">

    <section class="top-section">

        <a href="EventDatum.html" class="back-btn">

            <div class="back-icon">←</div>

            <span data-translate="goBack"></span>

        </a>

    </section>

    <section class="title-section">

        <h1 data-translate="registrationTitle"></h1>

        <p data-translate="registrationSubtitle"></p>

    </section>

    <section class="form-section">

        <div class="form-group">

            <label>

                <img src="./images/Personred.svg">

                <span data-translate="yourName"></span>

            </label>

            <input 
                type="text"
                id="nameInput"
                data-placeholder="yourNamePlaceholder"
            >

        </div>

        <div class="form-group">

            <label>

                <img src="./images/Companiered.svg">

                <span data-translate="workPlace"></span>

            </label>

            <input 
                type="text"
                id="companyInput"
                data-placeholder="workPlacePlaceholder"
            >

        </div>

        <div class="form-group">

            <label>

                <img src="./images/Companiered.svg">

                <span data-translate="companyOnSite"></span>

            </label>

            <input 
                type="text"
                id="locationInput"
                data-placeholder="companyOnSitePlaceholder"
            >

        </div>

        <div class="form-group">

            <label>

                <img src="./images/PeopleRed.svg">

                <span data-translate="meetPeople"></span>

            </label>

            <p
                class="roles-subtitle"
                data-translate="rolesSubtitle"
            ></p>

            <div class="roles-grid" id="rolesGrid"></div>

        </div>

    </section>

    <section class="bottom-button">

        <button
            id="confirmBtn"
            data-translate="confirmBtn"
        ></button>

    </section>

</main>

<script>

const translations = {

    en: {

        goBack:
            "Go back",

        registrationTitle:
            "Event Registration",

        registrationSubtitle:
            "Tell us about yourself so we can connect you with the right people",

        yourName:
            "Your name",

        yourNamePlaceholder:
            "Enter your full name",

        workPlace:
            "Where do you work?",

        workPlacePlaceholder:
            "Company name or studio",

        companyOnSite:
            "For which company on site?",

        companyOnSitePlaceholder:
            "AED Studio location",

        meetPeople:
            "Who would you like to meet?",

        rolesSubtitle:
            "Select all roles that interest you",

        confirmBtn:
            "CONFIRM REGISTRATION"

    },

    nl: {

        goBack:
            "Ga terug",

        registrationTitle:
            "Event Registratie",

        registrationSubtitle:
            "Vertel ons meer over jezelf zodat we je met de juiste mensen kunnen verbinden",

        yourName:
            "Jouw naam",

        yourNamePlaceholder:
            "Voer je volledige naam in",

        workPlace:
            "Waar werk je?",

        workPlacePlaceholder:
            "Bedrijfsnaam of studio",

        companyOnSite:
            "Voor welk bedrijf op locatie?",

        companyOnSitePlaceholder:
            "AED Studio locatie",

        meetPeople:
            "Wie zou je graag ontmoeten?",

        rolesSubtitle:
            "Selecteer alle rollen die je interesseren",

        confirmBtn:
            "BEVESTIG REGISTRATIE"

    },

    fr: {

        goBack:
            "Retour",

        registrationTitle:
            "Inscription à l'événement",

        registrationSubtitle:
            "Parlez-nous de vous afin que nous puissions vous connecter aux bonnes personnes",

        yourName:
            "Votre nom",

        yourNamePlaceholder:
            "Entrez votre nom complet",

        workPlace:
            "Où travaillez-vous ?",

        workPlacePlaceholder:
            "Nom de l'entreprise ou studio",

        companyOnSite:
            "Pour quelle entreprise sur site ?",

        companyOnSitePlaceholder:
            "Localisation AED Studio",

        meetPeople:
            "Qui aimeriez-vous rencontrer ?",

        rolesSubtitle:
            "Sélectionnez tous les rôles qui vous intéressent",

        confirmBtn:
            "CONFIRMER L'INSCRIPTION"

    }

};

function setLanguage(language){

    localStorage.setItem(
        "language",
        language
    );

    document
    .querySelectorAll(".lang-btn")
    .forEach(btn => {

        btn.classList.remove("active");

    });

    document
    .getElementById(`btn-${language}`)
    .classList.add("active");

    document
    .querySelectorAll("[data-translate]")
    .forEach(element => {

        const key =
            element.dataset.translate;

        element.textContent =
            translations[language][key];

    });

    document
    .querySelectorAll("[data-placeholder]")
    .forEach(element => {

        const key =
            element.dataset.placeholder;

        element.placeholder =
            translations[language][key];

    });

}

document
.getElementById("btn-nl")
.addEventListener("click", () => {

    setLanguage("nl");

});

document
.getElementById("btn-en")
.addEventListener("click", () => {

    setLanguage("en");

});

document
.getElementById("btn-fr")
.addEventListener("click", () => {

    setLanguage("fr");

});

const savedLanguage =

    localStorage.getItem("language")

    || "en";

setLanguage(savedLanguage);

const roles = [

    "Producer",
    "Developer",
    "Designer",
    "Sound Engineer",
    "Animator",
    "Director",
    "Project Manager",
    "Marketing Specialist",
    "Content Creator",
    "Photographer",
    "Video Editor",
    "Copywriter"

];

const rolesGrid =
    document.getElementById("rolesGrid");

const confirmBtn =
    document.getElementById("confirmBtn");

const nameInput =
    document.getElementById("nameInput");

const companyInput =
    document.getElementById("companyInput");

const locationInput =
    document.getElementById("locationInput");

let selectedRoles = [];

roles.forEach(role => {

    rolesGrid.innerHTML += `

        <button class="role-btn">

            ${role}

        </button>

    `;

});

const roleButtons =
    document.querySelectorAll(".role-btn");

roleButtons.forEach(button => {

    button.addEventListener("click", () => {

        const role =
            button.textContent.trim();

        button.classList.toggle("active");

        if(selectedRoles.includes(role)){

            selectedRoles =
                selectedRoles.filter(
                    item => item !== role
                );

        }

        else{

            selectedRoles.push(role);

        }

        validateForm();

    });

});

function validateForm(){

    const hasName =
        nameInput.value.trim() !== "";

    const hasCompany =
        companyInput.value.trim() !== "";

    const hasLocation =
        locationInput.value.trim() !== "";

    const hasRoles =
        selectedRoles.length > 0;

    if(
        hasName &&
        hasCompany &&
        hasLocation &&
        hasRoles
    ){

        confirmBtn.classList.add("active");

    }

    else{

        confirmBtn.classList.remove("active");

    }

}

nameInput.addEventListener(
    "input",
    validateForm
);

companyInput.addEventListener(
    "input",
    validateForm
);

locationInput.addEventListener(
    "input",
    validateForm
);

confirmBtn.addEventListener("click", () => {

    if(
        !confirmBtn.classList.contains(
            "active"
        )
    ) return;

    const registrationData = {

        selectedDate:
            localStorage.getItem(
                "selectedEventDate"
            ),

        name:
            nameInput.value,

        company:
            companyInput.value,

        location:
            locationInput.value,

        roles:
            selectedRoles

    };

    console.log(registrationData);

    localStorage.setItem(
        "eventRegistration",
        JSON.stringify(registrationData)
    );

    window.location.href =
        "confirmation.html";

});

</script>

</body>
</html>
