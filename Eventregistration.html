<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventregistration</title>

    <style>
:root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom:120px;
        }

        /* HEADER */

        .main-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid #fe0d005a;
        }

        .logo-area{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-placeholder{
            
            color:white;
            width:60px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:24px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .logo-text{
            display:flex;
            flex-direction:column;
        }

        .logo-text strong{
            font-size:16px;
        }

        .logo-text span{
            color:#888;
            font-size:12px;
        }

        .language-toggles{
            display:flex;
            gap:8px;
        }

        .lang-btn{
            background:#444;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            font-family:var(--font-main);
            font-weight:bold;
            cursor:pointer;
        }

        .lang-btn.active{
            background:var(--accent-color);
        }



    </style>

</head>
<body>
    
    <header class="main-header">

        <div class="logo-area">
            <div class="logo-placeholder"><img src="./images/Logo.svg" alt="logo"></div>

            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
        </div>

        <div class="language-toggles">
            <button class="lang-btn">NL</button>
            <button class="lang-btn active">EN</button>
            <button class="lang-btn">FR</button>
        </div>

    </header>

    

<main class="registration-page">

    

    <section class="top-section">

        <a href="EventDatum.html" class="back-btn">

            <span>←</span>

            Go back

        </a>

    </section>

    

    <section class="title-section">

        <h1>Event Registration</h1>

        <p>
            Tell us about yourself so we can connect you with the right people
        </p>

    </section>

    

    <section class="form-section">

        <!-- NAME -->

        <div class="form-group">

            <label>

                <img src="./images/UserRed.svg">

                Your name

            </label>

            <input 
                type="text"
                id="nameInput"
                placeholder="Enter your full name"
            >

        </div>

        

        <div class="form-group">

            <label>

                <img src="./images/BuildingRed.svg">

                Where do you work?

            </label>

            <input 
                type="text"
                id="companyInput"
                placeholder="Company name or studio"
            >

        </div>

        

        <div class="form-group">

            <label>

                <img src="./images/OfficeRed.svg">

                For which company on site?

            </label>

            <input 
                type="text"
                id="locationInput"
                placeholder="AED Studio location"
            >

        </div>

        

        <div class="form-group">

            <label>

                <img src="./images/PeopleRed.svg">

                Who would you like to meet?

            </label>

            <p class="roles-subtitle">
                Select all roles that interest you
            </p>

            <div class="roles-grid" id="rolesGrid">

                

            </div>

        </div>

    </section>

    

    <section class="bottom-button">

        <button id="confirmBtn">

            CONFIRM REGISTRATION

        </button>

    </section>

</main>

</body>
</html>
